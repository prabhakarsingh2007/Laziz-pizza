{% extends 'base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="max-w-lg mx-auto mt-10 bg-white shadow-lg rounded-lg p-8">

    <h2 class="text-3xl font-bold text-center text-red-600 mb-6">
        Create Account
    </h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <label class="block font-semibold mb-2">Full Name</label>
            <input type="text" name="name" placeholder="Enter Full Name" class="w-full border rounded-lg p-3" required>
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">Username</label>
            <input type="text" name="username" placeholder="Enter Username" class="w-full border rounded-lg p-3"
                required>
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">Email</label>
            <input type="email" name="email" placeholder="Enter Email" class="w-full border rounded-lg p-3" required>
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">Phone Number</label>
            <input type="text" name="phone" placeholder="Enter Phone Number" class="w-full border rounded-lg p-3"
                required>
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">Password</label>
            <input type="password" name="password" placeholder="Enter Password" class="w-full border rounded-lg p-3"
                required>
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm Password"
                class="w-full border rounded-lg p-3" required>
        </div>

        <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700">
            Register
        </button>

    </form>

    <p class="text-center mt-6">
        Already have an account?
        <a href="/accounts/login/" class="text-red-600 font-bold">
            Login
        </a>
    </p>

</div>

{% endblock %}
