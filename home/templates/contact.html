{% extends 'base.html' %}

{% block title %}
Contact Us
{% endblock %}

{% block content %}

<section class="max-w-4xl mx-auto py-10">

    <h1 class="text-4xl font-bold text-center text-red-600 mb-8">
        Contact Us
    </h1>

    <div class="bg-white shadow-lg rounded-lg p-8">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-5">
                <label class="block font-semibold mb-2">Full Name</label>
                <input type="text"
                       name="name"
                       placeholder="Enter Your Name"
                       class="w-full border rounded-lg p-3"
                       required>
            </div>

            <div class="mb-5">
                <label class="block font-semibold mb-2">Email</label>
                <input type="email"
                       name="email"
                       placeholder="Enter Your Email"
                       class="w-full border rounded-lg p-3"
                       required>
            </div>

            <div class="mb-5">
                <label class="block font-semibold mb-2">Phone</label>
                <input type="text"
                       name="phone"
                       placeholder="Enter Your Phone Number"
                       class="w-full border rounded-lg p-3">
            </div>

            <div class="mb-5">
                <label class="block font-semibold mb-2">Message</label>
                <textarea
                    name="message"
                    rows="5"
                    placeholder="Write Your Message"
                    class="w-full border rounded-lg p-3"
                    required></textarea>
            </div>

            <button type="submit"
                    class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700">
                Send Message
            </button>

        </form>

    </div>

</section>

{% endblock %}
