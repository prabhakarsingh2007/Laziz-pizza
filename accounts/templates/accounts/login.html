{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="max-w-md mx-auto mt-10 bg-white shadow-lg rounded-lg p-6">

    <h2 class="text-3xl font-bold text-center text-red-600 mb-6">
        Login
    </h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <label class="block font-semibold mb-2">
                Username
            </label>

            <input type="text" name="username" placeholder="Enter Username"
                class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-500" required>
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">
                Password
            </label>

            <input type="password" name="password" placeholder="Enter Password"
                class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-500" required>
        </div>

        <button type="submit" class="w-full bg-red-600 text-white p-3 rounded-lg hover:bg-red-700">
            Login
        </button>

    </form>

    <p class="text-center mt-5">
        Don't have an account?
        <a href="/accounts/register/" class="text-red-600 font-bold">
            Register
        </a>
    </p>

</div>

{% endblock %}
